name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./ci.db"
      NEXTAUTH_SECRET: "ci-placeholder-secret-ci-placeholder-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prisma generate + push (SQLite)
        run: npx prisma db push
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Audit (prod deps, fail on high+)
        run: npm audit --omit=dev --audit-level=high
      - name: Unit tests
        run: npm test
      - name: Integration tests (tenant isolation, SQLite)
        run: npm run test:integration
      - name: Build
        run: npm run build

  postgres-integration:
    name: Integration on PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cyberstar_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cyberstar_test"
      TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cyberstar_test"
      NEXTAUTH_SECRET: "ci-placeholder-secret-ci-placeholder-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Switch datasource to PostgreSQL
        run: npm run db:provider:postgres
      - name: Generate client
        run: npx prisma generate
      - name: Tenant-isolation tests on Postgres
        run: npm run test:integration

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./e2e.db"
      NEXTAUTH_SECRET: "ci-placeholder-secret-ci-placeholder-secret"
      NEXTAUTH_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Seed database
        run: npx prisma db push && npm run db:seed
      - name: Install Playwright browser
        run: npm run test:e2e:install
      - name: Run E2E
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

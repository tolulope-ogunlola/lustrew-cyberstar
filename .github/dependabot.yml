version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Batch routine updates into one PR.
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    # Major upgrades (e.g. Next, Prisma, Tailwind, ESLint) have breaking changes — handle those
    # manually with a migration, not via auto-PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
